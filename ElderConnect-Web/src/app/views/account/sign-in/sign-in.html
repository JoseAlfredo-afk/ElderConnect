<div class="d-flex align-items-center justify-content-center py-5" style="min-height: 90vh; background-color: #ffffff;">

  <div class="card border border-secondary-subtle p-5 shadow-sm text-center"
    style="width: 100%; max-width: 450px; background-color: #ebf5ff; border-radius: 20px;">

    <div class="mb-4">
      <img src="elderconnect.png" alt="ElderConnect" class="img-fluid bg-transparent p-0 border-0"
        style="max-height: 60px;">
    </div>

    <h2 class="fw-bold fs-3 text-dark mb-4">ElderConnect</h2>

    <form (ngSubmit)="logar($event)">

      <div class="mb-3 text-start mx-auto" style="max-width: 340px;">
        <label for="email" class="form-label fw-bold text-dark mb-1">E-mail</label>
        <input type="email" id="email" name="email" [(ngModel)]="emailInput"
          class="form-control shadow-sm border-dark py-2" placeholder="seu@email.com">
      </div>

      <div class="mb-3 text-start mx-auto" style="max-width: 340px;">
        <label for="password" class="form-label fw-bold text-dark mb-1">Senha</label>
        <input type="password" id="password" name="password" [(ngModel)]="senhaInput"
          class="form-control shadow-sm border-dark py-2" placeholder="Senha">
      </div>

      <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill py-2 w-100 mb-3">
        Entrar
      </button>
    </form>

    <div class="d-flex flex-column gap-2 mt-2" style="font-size: 0.85rem;">
      <a routerLink="/home" class="text-decoration-none fw-semibold text-secondary">Esqueci minha senha</a>
      <div class="d-flex justify-content-center gap-2">
        <span class="text-dark fw-bold">Não tem conta?</span>
        <a routerLink="/account/sign-up" class="text-decoration-none fw-bold" style="color: #0052cc;">Criar conta</a>
      </div>
    </div>
  </div>
</div>
