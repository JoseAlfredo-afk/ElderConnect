<div class="d-flex align-items-center justify-content-center" style="min-height: 85vh; background-color: #ffffff;">
  
  <div class="card border border-secondary-subtle p-5 shadow-sm text-center" 
       style="width: 100%; max-width: 500px; background-color: #ebf5ff; border-radius: 40px;">
    
    <div class="mb-4">
      <img src="elderconnect.png" alt="ElderConnect" class="img-fluid bg-transparent p-0 border-0" style="max-height: 60px;">
    </div>

    <h2 class="fw-bold fs-3 text-dark mb-4">Bem-vindo de volta!</h2>

    <form>
      <div class="mb-3 text-start mx-auto" style="max-width: 340px;">
        <label for="email" class="form-label fw-bold text-dark mb-1">E-mail</label>
        <input type="email" id="email" class="form-control shadow-sm border-dark py-2" placeholder="seu@email.com">
      </div>

      <div class="mb-1 text-start mx-auto" style="max-width: 340px;">
        <label for="password" class="form-label fw-bold text-dark mb-1">Senha</label>
        <input type="password" id="password" class="form-control shadow-sm border-dark py-2" placeholder="..........">
      </div>

      <div class="text-end mb-4 mx-auto" style="max-width: 340px;">
        <a routerLink="/recuperar-senha" class="text-decoration-none fw-semibold" style="font-size: 0.8rem; color: #0052cc;">
          Esqueci minha senha
        </a>
      </div>

      <div class="d-grid gap-2 mx-auto mb-3" style="max-width: 340px;">
        <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill py-2">
          Entrar
        </button>
      </div>
    </form>

    <div class="d-flex justify-content-center gap-2" style="font-size: 0.85rem;">
      <span class="text-dark fw-bold">Ainda não tem conta?</span>
      <a routerLink="/cadastro" class="text-decoration-none fw-bold" style="color: #0052cc;">Criar Conta</a>
    </div>

  </div>
</div>
