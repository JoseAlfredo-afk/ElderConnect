<div class="d-flex align-items-center justify-content-center py-5" style="min-height: 90vh; background-color: #ffffff;">

    <div class="card border border-secondary-subtle p-5 shadow-sm text-center"
        style="width: 100%; max-width: 750px; background-color: #ebf5ff; border-radius: 40px;">

        <h2 class="fw-bold fs-3 text-dark mb-1">Complete seu perfil de cuidador</h2>
        <p class="text-secondary fw-semibold mb-4" style="font-size: 0.85rem;">Informe seus dados profissionais</p>

        <form>
            <div class="row g-4 text-start justify-content-center mb-4">

                <div class="col-12 col-md-4 d-flex flex-column align-items-center justify-content-center text-center">
                    <label class="fw-bold text-dark mb-2" style="font-size: 0.9rem;">Foto de perfil</label>
                    <div class="d-flex align-items-center justify-content-center border border-primary bg-white rounded-circle shadow-sm"
                        style="width: 110px; height: 110px; cursor: pointer;">
                        <i class="bi bi-person text-primary" style="font-size: 3.5rem;"></i>
                    </div>
                </div>

                <div class="col-12 col-md-8 d-flex flex-column gap-3">
                    <div>
                        <label class="form-label fw-bold text-dark mb-1">Experiência profissional</label>
                        <input type="text" class="form-control shadow-sm border-secondary py-2"
                            placeholder="Ex: 5 anos cuidando de idosos">
                    </div>

                    <div class="row g-2">
                        <div class="col-7">
                            <label class="form-label fw-bold text-dark mb-1">Cidade</label>
                            <input type="text" class="form-control shadow-sm border-secondary py-2"
                                placeholder="Sua cidade">
                        </div>
                        <div class="col-5">
                            <label class="form-label fw-bold text-dark mb-1">Valor por hora (R$)</label>
                            <input type="text" class="form-control shadow-sm border-secondary py-2"
                                placeholder="EX: 25,00">
                        </div>
                    </div>
                </div>

            </div>

            <div class="card p-4 border border-secondary-subtle bg-white rounded-4 shadow-sm text-start mb-4 mx-auto"
                style="max-width: 650px; background-color: #f8faff !important;">

                <div class="d-flex flex-wrap justify-content-between gap-2 mb-3 px-2">
                    <div class="form-check"><input class="form-check-input border-dark" type="checkbox" id="seg"
                            checked><label class="form-check-label fw-bold" for="seg">Seg</label></div>
                    <div class="form-check"><input class="form-check-input border-dark" type="checkbox" id="ter"
                            checked><label class="form-check-label fw-bold" for="ter">Ter</label></div>
                    <div class="form-check"><input class="form-check-input border-dark" type="checkbox" id="qua"
                            checked><label class="form-check-label fw-bold" for="qua">Qua</label></div>
                    <div class="form-check"><input class="form-check-input border-dark" type="checkbox" id="qui"
                            checked><label class="form-check-label fw-bold" for="qui">Qui</label></div>
                    <div class="form-check"><input class="form-check-input border-dark" type="checkbox" id="sex"
                            checked><label class="form-check-label fw-bold" for="sex">Sex</label></div>
                    <div class="form-check"><input class="form-check-input border-dark" type="checkbox" id="sab"
                            checked><label class="form-check-label fw-bold" for="sab">Sáb</label></div>
                    <div class="form-check"><input class="form-check-input border-dark" type="checkbox" id="dom"
                            checked><label class="form-check-label fw-bold" for="dom">Dom</label></div>
                </div>

                <div class="row g-3 align-items-end">
                    <div class="col-4 col-sm-3">
                        <label class="form-label fw-bold text-secondary mb-1" style="font-size: 0.85rem;">Das</label>
                        <input type="text" class="form-control text-center shadow-sm border-secondary py-1.5"
                            value="08:00">
                    </div>
                    <div class="col-4 col-sm-3">
                        <label class="form-label fw-bold text-secondary mb-1" style="font-size: 0.85rem;">Até</label>
                        <input type="text" class="form-control text-center shadow-sm border-secondary py-1.5"
                            value="18:00">
                    </div>
                    <div class="col-12 col-sm-6 text-end text-sm-start mt-3">
                        <button type="button" class="btn btn-success fw-bold px-3 py-1.5 rounded-3 border-0"
                            style="background-color: #2ecc71;">
                            + Adicionar horário
                        </button>
                    </div>
                </div>
                <div class="mt-4">
                    <label class="form-label fw-bold text-dark mb-1">Formação / Curso</label>
                    <input type="text" class="form-control shadow-sm border-secondary py-2"
                        placeholder="Ex: Técnico em Enfermagem, Cuidador de idosos...">
                </div>
            </div>
            <div class="d-flex justify-content-center gap-3 mt-4">
                <button type="button" routerLink="/account/sign-up"
                    class="btn btn-light px-4 py-2 border border-secondary-subtle fw-bold rounded-pill text-dark"
                    style="min-width: 160px; background-color: #e9ecef;">
                    Cancelar
                </button>
                <button type="button" (click)="salvarPerfil()"
                    class="btn btn-success px-4 py-2 fw-bold rounded-pill border-0 text-white"
                    style="min-width: 160px; background-color: #2ecc71;">
                    Salvar perfil
                </button>
            </div>
        </form>
    </div>
</div>
