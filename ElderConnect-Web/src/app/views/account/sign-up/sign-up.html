<div class="d-flex align-items-center justify-content-center py-5" style="min-height: 90vh; background-color: #ffffff;">
  <div *ngIf="mostrarSucesso" class="alert alert-success d-flex align-items-center justify-content-center gap-2 border-0 shadow-sm py-2 mb-4 mx-auto rounded-pill text-success fw-bold" 
     style="background-color: #d1e7dd; max-width: 400px; font-size: 0.9rem;">
  <i class="bi bi-check-circle-fill"></i> Cadastrado com sucesso!
</div>
  <div class="card border border-secondary-subtle p-5 shadow-sm text-center" 
       style="width: 100%; max-width: 850px; background-color: #ebf5ff; border-radius: 40px;">
    
    <h2 class="fw-bold fs-3 text-dark mb-1">Crie sua conta</h2>
    <p class="text-secondary fw-semibold mb-4" style="font-size: 0.85rem;">Escolha o tipo de conta que deseja criar</p>

    <form [formGroup]="cadastroForm" (ngSubmit)="submeter()">
      
      <div class="row g-3 mb-4 justify-content-center mx-auto" style="max-width: 740px;">
        <div class="col-12 col-md-6">
          <div class="card p-3 border border-dark text-start bg-white h-100 rounded-4 shadow-sm" style="cursor: pointer;">
            <h4 class="fw-bold fs-5 text-dark mb-1">Idoso ou responsável</h4>
            <p class="text-secondary m-0" style="font-size: 0.75rem;">Sou idoso ou responsável por um idoso.</p>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="card p-3 border border-secondary-subtle text-center bg-white h-100 rounded-4 shadow-sm text-secondary" style="opacity: 0.85; cursor: pointer;">
            <h4 class="fw-bold fs-5 text-dark mb-1">Cuidador</h4>
            <p class="text-secondary m-0" style="font-size: 0.75rem;">Quero oferecer meus serviços de cuidado.</p>
          </div>
        </div>
      </div>

      <div class="row g-4 text-start mx-auto mb-4" style="max-width: 740px;">
        
        <div class="col-12 col-md-6 d-flex flex-column gap-3">
          <div>
            <label class="form-label fw-bold text-dark mb-1">Nome completo *</label>
            <input type="text" formControlName="nome" class="form-control shadow-sm border-dark py-2" 
                   [ngClass]="{'is-invalid': cadastroForm.get('nome')?.touched && cadastroForm.get('nome')?.invalid}" placeholder="Seu nome completo">
          </div>
          
          <div>
            <label class="form-label fw-bold text-dark mb-1">Data de nascimento *</label>
            <input type="text" formControlName="dataNascimento" (input)="aplicarMascara($event, 'data')" 
                   class="form-control shadow-sm border-dark py-2" 
                   [ngClass]="{'is-invalid': cadastroForm.get('dataNascimento')?.touched && cadastroForm.get('dataNascimento')?.invalid}" placeholder="dd/mm/aaaa">
          </div>
          
          <div>
            <label class="form-label fw-bold text-dark mb-1">E-mail *</label>
            <input type="email" formControlName="email" class="form-control shadow-sm border-dark py-2" 
                   [ngClass]="{'is-invalid': cadastroForm.get('email')?.touched && cadastroForm.get('email')?.invalid}" placeholder="seu@email.com">
            <div class="invalid-feedback" style="font-size: 0.75rem;">Insira um e-mail válido.</div>
          </div>
        </div>

        <div class="col-12 col-md-6 d-flex flex-column gap-3">
          <div>
            <label class="form-label fw-bold text-dark mb-1">CPF *</label>
            <input type="text" formControlName="cpf" (input)="aplicarMascara($event, 'cpf')" 
                   class="form-control shadow-sm border-dark py-2" 
                   [ngClass]="{'is-invalid': cadastroForm.get('cpf')?.touched && cadastroForm.get('cpf')?.invalid}" placeholder="000.000.000-00">
          </div>
          
          <div>
            <label class="form-label fw-bold text-dark mb-1">Telefone *</label>
            <input type="text" formControlName="telefone" (input)="aplicarMascara($event, 'telefone')" 
                   class="form-control shadow-sm border-dark py-2" 
                   [ngClass]="{'is-invalid': cadastroForm.get('telefone')?.touched && cadastroForm.get('telefone')?.invalid}" placeholder="(00) 00000-0000">
          </div>
          
          <div>
            <label class="form-label fw-bold text-dark mb-1">Senha *</label>
            <input type="password" formControlName="senha" class="form-control shadow-sm border-dark py-2" 
                   [ngClass]="{'is-invalid': cadastroForm.get('senha')?.touched && cadastroForm.get('senha')?.invalid}" placeholder="Mínimo 6 caracteres">
          </div>
          
          <div>
            <label class="form-label fw-bold text-dark mb-1">Confirma conta *</label>
            <input type="password" formControlName="confirmaSenha" class="form-control shadow-sm border-dark py-2" 
                   [ngClass]="{'is-invalid': cadastroForm.get('confirmaSenha')?.touched && cadastroForm.get('confirmaSenha')?.invalid}" placeholder="Confirme sua senha">
          </div>
        </div>

      </div>

      <div class="d-flex justify-content-center mb-3">
        <button type="submit" class="btn btn-primary btn-lg fw-bold px-5 rounded-pill py-2" style="min-width: 260px;">
          Cadastrar
        </button>
      </div>
    </form>

    <div class="d-flex justify-content-center gap-2" style="font-size: 0.85rem;">
      <span class="text-dark fw-bold">Já tem conta?</span>
      <a routerLink="/account/sign-in" class="text-decoration-none fw-bold" style="color: #0052cc;">Fazer login</a>
    </div>

  </div>
</div>
